baseURL = "/"
languageCode = "en-us"
title = "Service Mesh Blog"
enableRobotsTXT = true
enableGitInfo = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false

[params]
  description = "Deep dives into Istio, Envoy, and cloud-native networking — for platform engineers and SREs."

  [params.navbar]
    displayTitle = true
    displayLogo = true
    [params.navbar.logo]
      path = "logo.svg"
      dark = "logo.svg"
      link = "/"
      width = 40
      height = 40

  [params.page]
    width = "normal"

  [params.theme]
    default = "light"
    displayToggle = true

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = false

  [params.search]
    enable = true
    type = "flexsearch"

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    pageRef = "/blog"
    weight = 1
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    pageRef = "/tags"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    pageRef = "/about"
    weight = 3
