apiVersion: v1
kind: Namespace
metadata:
  name: auth
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-authz
  namespace: auth
  labels:
    app: ext-authz
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ext-authz
  template:
    metadata:
      labels:
        app: ext-authz
    spec:
      containers:
      - name: ext-authz
        image: ghcr.io/yourorg/ext-authz-server:latest
        ports:
        - containerPort: 9001
          name: grpc
        - containerPort: 8080
          name: health
        env:
        - name: GRPC_PORT
          value: "9001"
        - name: HEALTH_PORT
          value: "8080"
        - name: ALLOWED_PATHS
          value: "/healthz,/readyz,/public,/favicon.ico"
        - name: USERS_JSON
          valueFrom:
            secretKeyRef:
              name: ext-authz-users
              key: users.json
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ext-authz
  namespace: auth
spec:
  selector:
    app: ext-authz
  ports:
  - name: grpc
    port: 9001
    targetPort: 9001
  - name: health
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: ext-authz-users
  namespace: auth
type: Opaque
stringData:
  users.json: |
    {"admin":"changeme","readonly":"readonly123"}
